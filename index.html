<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Who Will Break Prod Next 🚀💥</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <style>
    /* ===== RESET ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ===== VARIABLES ===== */
    :root {
      --bg: #06031a;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.12);
      --text: #f0f0f8;
      --muted: #8a7aaa;
      --gold: #ff5c00;
      --stable-fusion: #00cad5;
      --wizards: #822bd9;
      --spin-duration: 4.5s;
    }

    /* ===== BODY ===== */
    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 0%,  rgba(130,43,217,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,92,0,0.13) 0%, transparent 55%),
        radial-gradient(ellipse 50% 50% at 50% 50%,  rgba(0,202,213,0.08) 0%, transparent 70%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      padding: 0 0 2rem;
      overflow-x: hidden;
    }

    /* ===== HEADER ===== */
    header {
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      width: 100%;
    }

    h1 {
      font-size: clamp(1rem, 2.8vw, 2.2rem);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      white-space: nowrap;
      background: linear-gradient(135deg, #ff5c00 0%, #822bd9 35%, #00cad5 70%, #0528ae 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: titlePulse 5s ease-in-out infinite;
    }

    .subtitle {
      margin-top: 0.6rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-style: italic;
      letter-spacing: 0.01em;
    }

    /* ===== MAIN ===== */
    main {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
      padding: 0 1rem;
    }

    /* ===== WHEEL SECTION ===== */
    #wheel-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      flex-shrink: 0;
      position: relative;
      z-index: 8;
    }

    #wheel-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
    }

    /* Glow ring behind wheel */
    #wheel-wrapper::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #ff5c0033, #822bd933, #00cad533, #0528ae33, #ff5c0033);
      filter: blur(16px);
      animation: glowRotate 8s linear infinite;
      pointer-events: none;
    }

    #pointer {
      position: absolute;
      top: -24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 2.2rem;
      line-height: 1;
      color: var(--gold);
      text-shadow: 0 0 12px rgba(255,92,0,0.9), 0 0 28px rgba(255,92,0,0.45);
      z-index: 5;
      pointer-events: none;
      animation: pointerBounce 1.8s ease-in-out infinite;
    }

    #wheel {
      display: block;
      border-radius: 50%;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      box-shadow:
        0 0 0 5px rgba(255,255,255,0.12),
        0 0 0 8px rgba(255,255,255,0.05),
        0 0 50px rgba(255,92,0,0.30),
        0 25px 80px rgba(0,0,0,0.6);
      transition: box-shadow 0.3s ease;
    }

    #wheel:hover:not([aria-disabled="true"]) {
      box-shadow:
        0 0 0 5px rgba(255,255,255,0.22),
        0 0 0 8px rgba(255,255,255,0.08),
        0 0 70px rgba(255,92,0,0.50),
        0 25px 80px rgba(0,0,0,0.6);
    }

    #wheel:focus-visible {
      outline: 3px solid var(--gold);
      outline-offset: 8px;
    }

    #wheel[aria-disabled="true"] {
      cursor: wait;
    }

    #spin-hint {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      min-height: 1.3em;
      transition: color 0.3s;
    }

    /* ===== RESULT SECTION ===== */
    #result-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      /* Always occupies layout space so the game area never shifts */
      visibility: hidden;
      pointer-events: none;
    }

    #result-section:not(.hidden) {
      visibility: visible;
      pointer-events: auto;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.2, 0.64, 1) both;
    }

    /* ===== GAME AREA — shared background for building + wheel ===== */
    #game-area {
      position: relative;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: row;
      align-items: stretch;
      min-height: 520px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(130,43,217,0.3);
      background:
        linear-gradient(to bottom,
          #06031a 0%,
          #100545 50%,
          #0a0330 100%);
    }

    /* Stars across the whole area */
    #game-area::before {
      content: '· · ✦ · ✦ · · ✦ · · ✦ ·';
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      text-align: center;
      color: rgba(255,255,255,0.15);
      font-size: 0.7rem;
      letter-spacing: 6px;
      pointer-events: none;
    }

    /* Ground across the full width */
    #game-area::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 28px;
      background: linear-gradient(to top, rgba(5,40,174,0.45), transparent);
      pointer-events: none;
    }

    /* ===== ANIMATION STAGE ===== */
    #animation-stage {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    /* ===== BUILDING ===== */
    #building-wrapper {
      position: absolute;
      bottom: 28px;
      left: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #building {
      display: flex;
      flex-direction: column;
      align-items: center;
      transform-origin: bottom center;
      transition: filter 0.5s, transform 0.5s;
    }

    .building-sign {
      background: linear-gradient(135deg, #150342, #22086b);
      border: 2px solid rgba(255,92,0,0.5);
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      padding: 8px 20px;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      color: #ff5c00;
      text-shadow: 0 0 8px rgba(255,92,0,0.75);
    }

    .building-body {
      width: 140px;
      background: linear-gradient(160deg, #1e0b55, #130744);
      border: 2px solid rgba(255,255,255,0.15);
      border-bottom: none;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      padding: 8px 7px;
    }

    .window {
      height: 14px;
      border-radius: 2px;
      background: rgba(0,202,213,0.06);
      border: 1px solid rgba(0,202,213,0.15);
    }

    .window.lit {
      background: rgba(255,92,0,0.75);
      border-color: rgba(255,92,0,0.9);
      box-shadow: 0 0 6px rgba(255,92,0,0.55), inset 0 0 4px rgba(255,255,255,0.25);
      animation: windowFlicker 3s ease-in-out infinite;
    }

    .building-base {
      width: 152px; /* 12px wider than body, matching original body+12 proportion */
      height: 14px;
      background: linear-gradient(to top, #220a63, #130744);
      border: 2px solid rgba(255,255,255,0.12);
      border-top: none;
    }

    /* ===== EXPLOSION LAYER ===== */
    /* bottom/left are set dynamically by JS to follow the first rocket's impact point */
    #explosion-layer {
      position: absolute;
      bottom: 78px;
      left: 70px;
      transform: scale(0);
      font-size: 6rem;
      z-index: 10;
      pointer-events: none;
      display: none;
      line-height: 1;
      filter: drop-shadow(0 0 20px rgba(255,92,0,0.9));
    }

    #explosion-layer.exploding {
      display: block;
      animation: explodeBurst 0.9s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    /* ===== ROCKETS ===== */
    #rockets-container {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 6;
    }

    .rocket {
      position: absolute;
      font-size: 2.2rem;
      line-height: 1;
      transform: rotate(-90deg);
    }

    .rocket.hit {
      animation: rocketHit var(--duration, 1.2s) ease-in var(--delay, 0s) both;
    }

    .rocket.miss {
      animation: rocketMiss var(--duration, 1.6s) ease-in var(--delay, 0s) both;
    }

    /* ===== RESULT CONTENT ===== */
    #result-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
      text-align: center;
    }

    #team-badge {
      display: inline-block;
      padding: 0.45rem 1.8rem;
      border-radius: 999px;
      font-size: 1.5rem;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #fff;
      animation: badgePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
    }

    #result-message {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      opacity: 0.9;
      animation: fadeInUp 0.4s ease-out 0.4s both;
    }

    #wizard-message {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--wizards);
      text-shadow: 0 0 24px rgba(130,43,217,0.7), 0 0 50px rgba(130,43,217,0.35);
      letter-spacing: 0.04em;
      animation: wizardReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    #wizard-message.hidden { display: none; }

    /* ===== FOOTER ===== */
    footer {
      margin-top: auto;
      padding: 2rem 1rem 1rem;
      color: var(--muted);
      font-size: 0.8rem;
      text-align: center;
      opacity: 0.7;
    }

    /* ===== KEYFRAME ANIMATIONS ===== */
    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(255,92,0,0.4)); }
      50%       { filter: drop-shadow(0 0 28px rgba(130,43,217,0.55)); }
    }

    @keyframes glowRotate {
      to { transform: rotate(360deg); }
    }

    @keyframes pointerBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50%       { transform: translateX(-50%) translateY(-6px); }
    }

    @keyframes windowFlicker {
      0%, 90%, 100% { opacity: 1; }
      92%            { opacity: 0.4; }
      94%            { opacity: 1; }
      96%            { opacity: 0.2; }
      98%            { opacity: 0.9; }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes badgePop {
      from { opacity: 0; transform: scale(0.4) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes wizardReveal {
      from { opacity: 0; transform: scale(0.2) rotate(-15deg); }
      to   { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    @keyframes rocketHit {
      0%   { transform: translateX(0px)              translateY(0px)                   rotate(-90deg) scale(1);   opacity: 1; }
      85%  { transform: translateX(var(--travel-x))  translateY(var(--y-offset, 0px)) rotate(-90deg) scale(1.1); opacity: 1; }
      100% { transform: translateX(var(--travel-x))  translateY(var(--y-offset, 0px)) rotate(-90deg) scale(0);   opacity: 0; }
    }

    @keyframes rocketMiss {
      0%   { transform: translateX(0px)                        translateY(0px)           rotate(-90deg); opacity: 1; }
      67%  { transform: translateX(var(--travel-x-waypoint))   translateY(0px)           rotate(-90deg); opacity: 1; }
      100% { transform: translateX(var(--travel-x-waypoint))   translateY(var(--miss-y)) rotate(0deg);   opacity: 0; }
    }

    @keyframes explodeBurst {
      0%   { transform: scale(0);   opacity: 1; }
      35%  { transform: scale(2.2); opacity: 1; }
      100% { transform: scale(5);   opacity: 0; }
    }

    @keyframes buildingShake {
      0%,100% { transform: translateX(0) rotate(0); }
      12%     { transform: translateX(-7px) rotate(-2deg); }
      25%     { transform: translateX(7px)  rotate(2deg); }
      37%     { transform: translateX(-5px) rotate(-1deg); }
      50%     { transform: translateX(5px)  rotate(1deg); }
      62%     { transform: translateX(-3px) rotate(-0.5deg); }
      75%     { transform: translateX(3px)  rotate(0.5deg); }
      87%     { transform: translateX(-1px) rotate(0); }
    }

    @keyframes buildingCollapse {
      0%   { transform: scale(1)    rotate(0)     translateY(0);   opacity: 1; filter: brightness(1); }
      20%  { transform: scale(1.06) rotate(-2deg) translateY(-4px); opacity: 1; filter: brightness(2) saturate(2); }
      55%  { transform: scale(0.9)  rotate(4deg)  translateY(10px); opacity: 0.8; filter: brightness(1.5) hue-rotate(20deg); }
      80%  { transform: scale(0.65) rotate(-6deg) translateY(30px); opacity: 0.4; }
      100% { transform: scale(0)    rotate(10deg) translateY(60px); opacity: 0; }
    }

    .building-shaking   { animation: buildingShake 0.45s ease-in-out 3; }
    .building-collapsing { animation: buildingCollapse 0.85s ease-in forwards; }

    /* ===== PROGRESSIVE DAMAGE ===== */
    #building-wrapper[data-damage="1"] #building { filter: brightness(0.88); }
    #building-wrapper[data-damage="2"] #building { filter: brightness(0.75); transform: rotate(-0.5deg); }
    #building-wrapper[data-damage="3"] #building { filter: brightness(0.6);  transform: rotate(-1deg); }
    #building-wrapper[data-damage="4"] #building { filter: brightness(0.45); transform: rotate(-2deg); }
    #building-wrapper[data-damage="5"] #building { filter: brightness(0.3) sepia(0.3); transform: rotate(-3deg) scaleX(0.97); }

    /* ===== HIT HOLES ===== */
    .hit-hole {
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #000 0%, #1a0500 45%, transparent 72%);
      border: 1.5px solid rgba(255, 80, 0, 0.45);
      box-shadow: 0 0 8px rgba(255, 70, 0, 0.55), inset 0 0 6px rgba(0,0,0,1);
      pointer-events: none;
      z-index: 5;
      animation: holeAppear 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes holeAppear {
      0%   { transform: scale(0); opacity: 0; }
      60%  { transform: scale(1.5); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      #wheel-wrapper { width: 310px; height: 310px; }
      #game-area { flex-direction: column; min-height: 0; }
      #animation-stage { height: 380px; }
    }

    /* ===== REDUCED MOTION ===== */
    @media (prefers-reduced-motion: reduce) {
      /* Disable decorative looping animations entirely */
      #pointer, h1, #wheel-wrapper::before,
      .window.lit { animation: none !important; }

      /* Collapse functional one-shot animations to a single instant frame
         so result states still appear, just without motion */
      .rocket.hit, .rocket.miss,
      #explosion-layer.exploding,
      .building-shaking, .building-collapsing,
      .hit-hole,
      #result-section, #team-badge, #result-message,
      #wizard-message {
        animation-duration: 1ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 1ms !important;
      }
    }
  </style>
</head>

  <script>
    /* ===================================================================
       CONFIGURATION
    =================================================================== */
    const TEAMS = [
      {
        name: 'Voyagers',
        color: '#ff5c00',
        darkColor: '#cc4400',
        textColor: '#fff',
        message: 'Voyagers has entered the chat. 🛸',
      },
      {
        name: 'Stable\nFusion',
        displayName: 'Stable Fusion',
        color: '#00cad5',
        darkColor: '#0099a8',
        textColor: '#fff',
        message: 'Stable Fusion, please stop touching prod. 🔥',
      },
      {
        name: 'Wizards',
        color: '#822bd9',
        darkColor: '#5c1fa3',
        textColor: '#fff',
        message: 'Wizards has transcended the blame matrix. ✨',
        isWizards: true,
      },
    ];

    /* ===================================================================
       STATE
    =================================================================== */
    let currentRotation = 0;   // degrees, cumulative (always increases)
    let isSpinning      = false;
    let firstSpinDone   = false;
    let hitCount        = 0;   // number of rocket hits; resets on page refresh
    let buildingCollapsed = false; // true after 5 hits — wheel is permanently disabled

    const DAMAGE_THRESHOLD = 5;          // hits required to collapse the building
    const ROCKET_WAYPOINT_RATIO = 2 / 3; // fraction of travel distance at which miss rockets veer

    /* ===================================================================
       BUILDING GEOMETRY CONSTANTS
       These match the CSS dimensions of #building-wrapper and its children.
    =================================================================== */
    const BW_BOTTOM          = 28;   // building-wrapper CSS bottom (px) in animation-stage
    const BUILDING_BODY_MIN  = BW_BOTTOM + 14;   // bottom of body above stage floor
    const BUILDING_BODY_MAX  = BW_BOTTOM + 420;  // top of body (sign excluded)
    const HOLE_LEFT_MIN      = 6;    // leftmost x for a hole within building-wrapper
    const HOLE_LEFT_RANGE    = 108;  // horizontal span (body width ≈ 140px, minus margins)

    /* ===================================================================
       CANVAS SETUP
    =================================================================== */
    const canvas  = document.getElementById('wheel');
    const ctx     = canvas.getContext('2d');
    const CX      = canvas.width  / 2;   // 210
    const CY      = canvas.height / 2;   // 210
    const RADIUS  = CX - 12;             // 198
    const NUM_SEG = TEAMS.length;        // 3
    const SEG_RAD = (2 * Math.PI) / NUM_SEG;  // 120° in radians

    /* ===================================================================
       WHEEL DRAWING
       Layout at rotation = 0:
         Segment 0 (Voyagers)     center → TOP    (−90° = 270°)
         Segment 1 (Stable Fusion) center → 30°
         Segment 2 (Wizards)       center → 150°
       So drawWheel(0) puts Voyagers at the pointer.
    =================================================================== */
    function drawWheel(rotationDeg) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(CX, CY);
      ctx.rotate((rotationDeg * Math.PI) / 180);

      TEAMS.forEach((team, i) => {
        const centerAngle = -Math.PI / 2 + i * SEG_RAD;
        const startAngle  = centerAngle - SEG_RAD / 2;
        const endAngle    = centerAngle + SEG_RAD / 2;

        /* --- Segment fill --- */
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, 0, RADIUS, startAngle, endAngle);
        ctx.closePath();

        const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, RADIUS);
        grad.addColorStop(0,   team.color + '66');
        grad.addColorStop(0.5, team.color);
        grad.addColorStop(1,   team.darkColor);
        ctx.fillStyle = grad;
        ctx.fill();

        /* --- Segment border --- */
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth   = 2;
        ctx.stroke();

        /* --- Team label --- */
        ctx.save();
        ctx.rotate(centerAngle);
        ctx.textAlign    = 'center';
        ctx.textBaseline = 'middle';

        const lines    = team.name.split('\n');
        const fontSize = lines.length > 1 ? 15 : 17;
        const textX    = RADIUS * 0.61;

        ctx.font = `900 ${fontSize}px system-ui, sans-serif`;

        // Drop shadow
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        lines.forEach((line, li) => {
          const yOff = lines.length > 1 ? (li - 0.5) * (fontSize + 5) : 0;
          ctx.fillText(line, textX + 1, yOff + 1);
        });

        // Main text
        ctx.fillStyle = team.textColor;
        lines.forEach((line, li) => {
          const yOff = lines.length > 1 ? (li - 0.5) * (fontSize + 5) : 0;
          ctx.fillText(line, textX, yOff);
        });

        ctx.restore();
      });

      /* --- Divider spokes --- */
      for (let i = 0; i < NUM_SEG; i++) {
        const angle = -Math.PI / 2 - SEG_RAD / 2 + i * SEG_RAD;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(angle) * RADIUS, Math.sin(angle) * RADIUS);
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.lineWidth   = 3;
        ctx.stroke();
      }

      /* --- Outer ring --- */
      ctx.beginPath();
      ctx.arc(0, 0, RADIUS, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(255,255,255,0.35)';
      ctx.lineWidth   = 5;
      ctx.stroke();

      /* --- Center hub --- */
      ctx.beginPath();
      ctx.arc(0, 0, 30, 0, 2 * Math.PI);
      const hub = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
      hub.addColorStop(0, 'rgba(255,255,255,0.18)');
      hub.addColorStop(1, '#0c0435');
      ctx.fillStyle = hub;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth   = 2.5;
      ctx.stroke();

      /* Hub dot */
      ctx.beginPath();
      ctx.arc(0, 0, 7, 0, 2 * Math.PI);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fill();

      ctx.restore();
    }

    /* ===================================================================
       SELECTION LOGIC
       Base rotations that bring each team to the top pointer:
         Team 0 (Voyagers):      0°  (already at top when rotation=0)
         Team 1 (Stable Fusion): 240°
         Team 2 (Wizards):       120°
       Derivation:
         Team i center in wheel-local coords: −90° + i·120°
         For center to reach top (−90°):  R = −90° − (−90° + i·120°) = −i·120°
         In positive degrees: 0°, 240°, 120°
    =================================================================== */
    const BASE_ROT = [0, 240, 120];   // degrees per team index

    function selectTeam() {
      const eligible = firstSpinDone ? [0, 1, 2] : [0, 1];
      return eligible[Math.floor(Math.random() * eligible.length)];
    }

    function getTargetRotation(teamIndex) {
      // Add ±38° jitter (= 0.5 × 76) — stays well within the ±60° half-segment
      // boundary, so the pointer still lands on the correct team slice.
      const jitter   = (Math.random() - 0.5) * 76;
      const targetMod = ((BASE_ROT[teamIndex] + jitter) % 360 + 360) % 360;

      const currentMod = ((currentRotation % 360) + 360) % 360;
      let   angDiff    = (targetMod - currentMod + 360) % 360;
      if (angDiff < 60) angDiff += 360;  // guarantee forward motion

      const extraSpins = (5 + Math.floor(Math.random() * 5)) * 360;
      return currentRotation + angDiff + extraSpins;
    }

    /* ===================================================================
       SPIN
    =================================================================== */
    function spin() {
      if (isSpinning || buildingCollapsed) return;

      const teamIndex    = selectTeam();
      const finalRotation = getTargetRotation(teamIndex);

      isSpinning = true;
      canvas.setAttribute('aria-disabled', 'true');

      document.getElementById('result-section').classList.add('hidden');
      document.getElementById('spin-hint').textContent = '🌀 The wheel of fate is deciding…';

      animateSpin(currentRotation, finalRotation, teamIndex);
    }

    /* ===================================================================
       ANIMATION
    =================================================================== */
    function easeOutQuint(t) {
      return 1 - Math.pow(1 - t, 5);
    }

    function animateSpin(from, to, teamIndex) {
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      const DURATION      = reducedMotion ? 350 : 4500;
      const startTime     = performance.now();

      function frame(now) {
        const elapsed = now - startTime;
        const t       = Math.min(elapsed / DURATION, 1);
        const eased   = easeOutQuint(t);

        currentRotation = from + (to - from) * eased;
        drawWheel(currentRotation);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          currentRotation = to;
          drawWheel(currentRotation);
          isSpinning = false;
          firstSpinDone = true;
          canvas.removeAttribute('aria-disabled');
          document.getElementById('spin-hint').textContent =
            'Click or press Space to spin again!';
          showResult(teamIndex);
        }
      }

      requestAnimationFrame(frame);
    }

    /* ===================================================================
       RESULT DISPLAY
    =================================================================== */
    function showResult(teamIndex) {
      const team        = TEAMS[teamIndex];
      const displayName = team.displayName || team.name;
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      /* --- Reset stage (preserve damage state on building-wrapper) --- */
      const building      = document.getElementById('building');
      const explosionLayer = document.getElementById('explosion-layer');
      const rocketsCont   = document.getElementById('rockets-container');
      const wizMsg        = document.getElementById('wizard-message');

      building.className = '';
      explosionLayer.className = '';
      explosionLayer.style.display = 'none';
      rocketsCont.innerHTML = '';
      wizMsg.classList.add('hidden');

      /* --- Badge & message --- */
      const badge = document.getElementById('team-badge');
      badge.textContent   = displayName;
      badge.style.background  = team.color;
      badge.style.boxShadow   = `0 0 24px ${team.color}99, 0 4px 16px rgba(0,0,0,0.4)`;

      document.getElementById('result-message').textContent = team.message;

      /* --- Show section --- */
      const resultSection = document.getElementById('result-section');
      resultSection.classList.remove('hidden');

      /* --- Trigger animations --- */
      const ROCKET_DURATION = reducedMotion ? 0.4 : 1.3;

      if (team.isWizards) {
        /* Rockets launch and miss */
        launchRockets(false, reducedMotion);
        setTimeout(() => {
          wizMsg.classList.remove('hidden');
        }, reducedMotion ? 50 : 2200);
      } else {
        /* Rockets fly from wheel → hit building → explode + damage */
        const impacts = launchRockets(true, reducedMotion);
        const HIT_TIME = reducedMotion ? 50 : Math.round(ROCKET_DURATION * 0.85 * 1000);
        setTimeout(() => {
          shakeAndExplode(reducedMotion, impacts[0]);
        }, HIT_TIME);
      }
    }

    /* ===================================================================
       ROCKET ANIMATION
    =================================================================== */
    function launchRockets(hit, reducedMotion) {
      const container = document.getElementById('rockets-container');
      const stage     = document.getElementById('animation-stage');
      const wheel     = document.getElementById('wheel');
      container.innerHTML = '';

      /* Compute wheel centre relative to the animation-stage coordinate system */
      const stageRect = stage.getBoundingClientRect();
      const wheelRect = wheel.getBoundingClientRect();

      const wheelCenterX = wheelRect.left + wheelRect.width  / 2 - stageRect.left;
      const wheelCenterFromBottom = stageRect.bottom - (wheelRect.top + wheelRect.height / 2);

      /* Spawn position expressed as right/bottom offsets within rockets-container
         (which has inset:0 = same bounds as animation-stage).
         Negative right → extends into the wheel section area (that's fine;
         animation-stage has overflow:visible and game-area clips at its edge). */
      const spawnRight  = stage.offsetWidth - wheelCenterX;
      const spawnBottom = wheelCenterFromBottom;

      /* Horizontal travel: wheel centre → building area (~70 px from stage left) */
      const leftwardDistance = -(wheelCenterX - 70);

      const dur    = reducedMotion ? 0.4 : 1.3;
      const delays = [0, 0.32, 0.64];

      /* Random y-offsets so each rocket targets a different floor of the building.
         Building body spans roughly stage-bottom BUILDING_BODY_MIN → BUILDING_BODY_MAX px.
         CSS translateY(yOffset): negative = moves UP → larger visual "bottom" distance. */
      const yOffsets = delays.map(() => {
        const targetBottom = BUILDING_BODY_MIN + Math.random() * (BUILDING_BODY_MAX - BUILDING_BODY_MIN);
        return -(targetBottom - spawnBottom);  // CSS translateY value
      });

      const impacts = [];

      delays.forEach((delay, i) => {
        const el = document.createElement('div');
        el.className   = `rocket ${hit ? 'hit' : 'miss'}`;
        el.textContent = '🚀';
        el.style.right  = `${spawnRight}px`;
        el.style.bottom = `${spawnBottom}px`;
        el.style.setProperty('--delay',    `${delay}s`);
        el.style.setProperty('--y-offset', `${yOffsets[i]}px`);
        el.style.setProperty('--duration', `${dur}s`);
        el.style.setProperty('--travel-x', `${leftwardDistance}px`);
        if (!hit) {
          /* Rocket travels to ROCKET_WAYPOINT_RATIO of the distance then veers up or down */
          const waypointX = leftwardDistance * ROCKET_WAYPOINT_RATIO;
          el.style.setProperty('--travel-x-waypoint', `${waypointX}px`);
          const missY = (Math.random() < 0.5 ? -1 : 1) * 300;
          el.style.setProperty('--miss-y', `${missY}px`);
        }
        container.appendChild(el);

        if (hit) {
          /* Impact bottom = where the rocket visually ends up (in stage coords) */
          const impactBottom = spawnBottom - yOffsets[i];
          impacts.push(impactBottom);
          const holeDelay = (delay + dur * 0.85) * 1000;
          setTimeout(() => createHole(impactBottom), holeDelay);
        }
      });

      return impacts;
    }

    /* ===================================================================
       HIT HOLES — persists on building across spins
    =================================================================== */
    function createHole(impactBottom) {
      const buildingWrapper = document.getElementById('building-wrapper');
      const holeBottom = Math.max(2, impactBottom - BW_BOTTOM);
      const holeLeft   = HOLE_LEFT_MIN + Math.random() * HOLE_LEFT_RANGE;

      const hole = document.createElement('div');
      hole.className      = 'hit-hole';
      hole.style.bottom   = `${holeBottom}px`;
      hole.style.left     = `${holeLeft}px`;
      buildingWrapper.appendChild(hole);
    }

    /* ===================================================================
       APPLY PROGRESSIVE DAMAGE
    =================================================================== */
    function applyDamage() {
      hitCount++;
      const buildingWrapper = document.getElementById('building-wrapper');
      buildingWrapper.dataset.damage = hitCount;

      /* Turn off one lit window per hit */
      const litWindows = document.querySelectorAll('#building .window.lit');
      if (litWindows.length > 0) {
        litWindows[litWindows.length - 1].classList.remove('lit');
      }
    }

    /* ===================================================================
       SHAKE + EXPLODE (no collapse — building stays and accumulates damage)
    =================================================================== */
    function shakeAndExplode(reducedMotion, impactBottom) {
      const building     = document.getElementById('building');
      const explosionLayer = document.getElementById('explosion-layer');

      applyDamage();

      /* ---- Position explosion near where the first rocket hit ---- */
      if (!reducedMotion && impactBottom !== undefined) {
        const EXPLOSION_MIN_BOTTOM  = 20;
        const EXPLOSION_Y_OFFSET    = 10;
        const EXPLOSION_BASE_LEFT   = 50;
        const EXPLOSION_LEFT_JITTER = 40;
        explosionLayer.style.bottom = `${Math.max(EXPLOSION_MIN_BOTTOM, impactBottom - EXPLOSION_Y_OFFSET)}px`;
        explosionLayer.style.left   = `${EXPLOSION_BASE_LEFT + Math.random() * EXPLOSION_LEFT_JITTER}px`;
      }

      /* ---- Final hit: collapse the building ---- */
      if (hitCount >= DAMAGE_THRESHOLD) {
        buildingCollapsed = true;
        canvas.setAttribute('aria-disabled', 'true');
        document.getElementById('spin-hint').textContent = '💥 PROD is down! Refresh to rebuild.';

        if (!reducedMotion) {
          explosionLayer.style.display = 'block';
          explosionLayer.classList.add('exploding');
          building.classList.add('building-collapsing');
        }
        return;
      }

      if (reducedMotion) return;

      /* Show explosion at the building the moment the rocket hits */
      explosionLayer.style.display = 'block';
      explosionLayer.classList.add('exploding');

      /* Shake the building */
      building.classList.add('building-shaking');

      /* Clean up shake after 3 iterations */
      const SHAKE_MS = 450 * 3 + 100;
      setTimeout(() => {
        building.classList.remove('building-shaking');
      }, SHAKE_MS);

      /* Clean up explosion after animation completes */
      setTimeout(() => {
        explosionLayer.classList.remove('exploding');
        explosionLayer.style.display = 'none';
      }, 950);
    }

    /* ===================================================================
       EVENT LISTENERS
    =================================================================== */
    canvas.addEventListener('click', spin);

    canvas.addEventListener('keydown', (e) => {
      if (e.key === ' ' || e.key === 'Enter') {
        e.preventDefault();
        spin();
      }
    });

    /* ===================================================================
       INITIALISE
    =================================================================== */
    drawWheel(0);
  </script>
</body>
</html>
